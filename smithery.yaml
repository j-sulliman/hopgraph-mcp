name: hopgraph
description: >
  Verify Australian and New Zealand businesses against government registers.
  Surfaces regulatory findings across jurisdictions — including bans,
  disqualifications, and insolvencies — that no single register search can reveal.
  Each verification produces an immutable compliance record.
vendor: HopGraph
sourceUrl: https://github.com/hopgraph/hopgraph-mcp
homepage: https://hopgraph.com
license: Proprietary
tags:
  - compliance
  - verification
  - government-data
  - australia
  - new-zealand
  - aml
  - due-diligence
  - regulatory
startCommand:
  type: remote
  url: https://hopgraph.com/mcp/
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        title: API Key
        description: "Get a free API key at https://hopgraph.com/signup"
